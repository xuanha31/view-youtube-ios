name: ViewTube
options:
  bundleIdPrefix: com.viewtube
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    # SideStore re-signs with the user's free Apple ID, so CI builds unsigned.
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGN_IDENTITY: ""
    DEVELOPMENT_TEAM: ""

targets:
  ViewTube:
    type: application
    platform: iOS
    sources:
      - path: App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.viewtube.app
        PRODUCT_NAME: ViewTube
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: ViewTube
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Background audio + PiP keep playback alive when screen is locked.
        UIBackgroundModes:
          - audio
          - fetch
        # NextDNS API + YouTube web are HTTPS; no ATS exceptions needed.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    entitlements:
      path: App/ViewTube.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.viewtube.shared
